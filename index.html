<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LHTRPG Cocofolia Converter</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #18202f;
      --muted: #657083;
      --line: #dce2ec;
      --accent: #0f7a74;
      --accent-strong: #075f5a;
      --warn: #9a3412;
      --shadow: 0 18px 46px rgba(33, 44, 65, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(15, 122, 116, 0.08), transparent 280px),
        var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0;
    }

    header {
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.08;
    }

    .lead {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .workspace {
      display: grid;
      grid-template-columns: 420px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .controls {
      padding: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    input {
      min-height: 46px;
      padding: 10px 12px;
    }

    textarea {
      min-height: 620px;
      padding: 14px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      padding: 0 16px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-strong);
    }

    button.secondary {
      background: #e7f0f0;
      color: var(--accent-strong);
    }

    button.secondary:hover {
      background: #d5e7e6;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.62;
    }

    .status {
      min-height: 24px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .status.error {
      color: var(--warn);
      font-weight: 700;
    }

    .output-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 14px 0;
    }

    .output-head h2 {
      margin: 0;
      font-size: 16px;
    }

    .output-body {
      padding: 14px;
    }

    @media (max-width: 860px) {
      main {
        width: min(100% - 20px, 720px);
        padding: 24px 0;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      textarea {
        min-height: 420px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>LHTRPG Cocofolia Converter</h1>
      <p class="lead">ログ・ホライズンTRPGのキャラクターIDまたはURLからJSONを取得し、ココフォリアに貼り付けられるキャラクター駒データへ変換します。</p>
    </header>

    <div class="workspace">
      <section class="controls" aria-labelledby="formTitle">
        <h2 id="formTitle">変換元</h2>
        <label for="source">キャラクターID / URL</label>
        <input id="source" type="text" inputmode="url" autocomplete="off" placeholder="208568 または https://lhrpg.com/lhz/pc?id=208568">
        <div class="row">
          <button id="convert" type="button">変換</button>
          <button id="sample" class="secondary" type="button">サンプル変換</button>
        </div>
        <div id="status" class="status" role="status" aria-live="polite"></div>
      </section>

      <section aria-labelledby="outputTitle">
        <div class="output-head">
          <h2 id="outputTitle">変換後JSON</h2>
          <button id="copy" class="secondary" type="button">コピー</button>
        </div>
        <div class="output-body">
          <textarea id="output" spellcheck="false" placeholder="ここにココフォリア貼り付け用JSONが出力されます"></textarea>
        </div>
      </section>
    </div>
  </main>

  <script>
    const sourceInput = document.querySelector("#source");
    const output = document.querySelector("#output");
    const statusEl = document.querySelector("#status");
    const convertButton = document.querySelector("#convert");
    const copyButton = document.querySelector("#copy");
    const sampleButton = document.querySelector("#sample");

    const timingOrder = ["セットアップ", "ムーブ", "マイナー", "メジャー", "インスタント", "行動", "本文", "判定直前", "プリプレイ", "常時"];

    const basicActions = [
      "○基本動作",
      "《ラン》 [基本動作] [移動] SR:-/- タイミング:ムーブ 判定：判定なし 対象:自身 射程：至近 コスト:- 制限：- 効果：あなたは【移動力】Ｓｑまで［通常移動］をしてもよい。 ",
      "《ダッシュ》 [基本動作] [移動] SR:-/- タイミング:ムーブ 判定：判定なし 対象:自身 射程：至近 コスト:- 制限：- 効果：あなたは［【移動力】＋２］Ｓｑまで［通常移動］をしてもよい。あなたは直後のマイナーアクションを１回失う。マイナーアクションを失えない場合は使用できない。 ",
      "《シフト》 [基本動作] [移動] SR:-/- タイミング:ムーブ 判定：判定なし 対象:自身 射程：至近 コスト:- 制限：- 効果：あなたは１Ｓｑまで［即時移動］をしてもよい。あなたは直後のマイナーアクションを１回失う。マイナーアクションを失えない場合は使用できない。 ",
      "《敵情を探る》 [基本動作] [偵察] SR:-/- タイミング:ブリーフィング 判定：基本（運動） 対象:本文 射程：本文 コスト:- 制限：- 効果：次のシーンの戦闘における敵の情報を得ようと試みる。〔達成値：１０〕登場するエネミーの数を知る。〔達成値：２０〕そのうちランクが一番低いエネミー１体（該当するエネミーが複数の場合はＧＭが選択）の名称と、［ボス］［モブ］タグの有無を知る。〔ファンブル〕エネミーは偵察に気がつく。 ",
      "《基本武器攻撃》 [基本動作] [武器攻撃] SR:-/- タイミング:メジャー 判定：対決(命中/回避) 対象:単体 射程：武器 コスト:- 制限：- 効果：対象に［【攻撃力】＋１Ｄ］の物理ダメージを与える。 ",
      "《基本魔法攻撃》 [基本動作] [魔法攻撃] [杖] [魔石] SR:-/- タイミング: メジャー 判定：対決(命中/抵抗) 対象:単体 射程：4Sq コスト:- 制限：- 効果：対象に［【魔力】＋１Ｄ］の魔法ダメージを与える。 ",
      "《異常探知》 [基本動作] SR:-/- タイミング:セットアップ 判定：基本（知覚／探知難易度） 対象:広範囲20（無差別） 射程：至近 コスト:- 制限：- 効果：【探知難易度】を持つ範囲内すべての存在を対象とする。対象の［隠蔽］状態および［隠密］状態は解除される。あなたの味方に対しては、解除する効果を適用しなくてもよい。 ",
      "《エネミー識別》 [基本動作] SR:-/- タイミング:セットアップ 判定：基本（知識／識別難易度） 対象:単体 射程：20Sq コスト:- 制限：- 効果：【識別難易度】を持つキャラクターを対象とする。対象は［識別済］状態となる。 ",
      "《プロップ解析》 [基本動作] SR:-/- タイミング:メジャー 判定：基本（解析／解析難易度） 対象:本文 射程：1Sq コスト:- 制限：- 効果：【解析難易度】を持つプロップ１つを対象とする。対象は［解析済］状態になる。 ",
      "《プロップ解除》 [基本動作] SR:-/- タイミング:メジャー 判定：基本（解除／解除難易度） 対象:本文 射程：1Sq コスト:- 制限：- 効果：【解除難易度】を持ち、かつ［解析済］状態のプロップ１つを対象とする。対象は効果を停止する。 ",
      "《とどめの一撃》 [基本動作] SR:-/- タイミング:インスタント 判定：判定なし 対象:自身 射程：至近 コスト:- 制限：- 効果：このメインプロセスであなたが攻撃を行ない、その攻撃により対象に含まれる［戦闘不能］状態のキャラクターにＨＰダメージを１点でも与えられる状況となった場合、そのキャラクターを［死亡］状態にする。 ",
      "《かばう》 [基本動作] SR:-/- タイミング:ダメージ適用直前 判定：判定なし 対象:単体 射程：至近 コスト:- 制限：- 効果：あなたは［ダメージ適用ステップ］であなた以外の対象が受ける予定のダメージをかわりに受ける。対象はダメージを受けることはない。《かばう》を行なうためには［未行動］でなければならず、また《かばう》を行なうことで即座に［行動済］になる。１回の攻撃に対して１回まで使用可能。エネミーはこの基本動作を行なえない。 ",
      "《装備の変更》 [基本動作] [準備] SR:-/- タイミング:マイナー 判定：判定なし 対象:自身 射程：至近 コスト:- 制限：- 効果：［装備品スロット］のアイテムを［所持品スロット］に移してもよい。また、［所持品スロット］のアイテムを［装備品スロット］に装備してもよい。アイテムを足下に落とす、拾うなども装備の変更の一部と見なす。１回の行動でできる装備の変更の数に制限はない。好きなように装備を変更できる。この基本動作をブリーフィングで使用する際、１つの ブリーフィングで複数回使用できる。 ",
      "《受け渡し》 [基本動作] [準備] SR:-/- タイミング:マイナー 判定：判定なし 対象:単体 射程：至近 コスト:- 制限：- 効果：あなたの［所持品スロット］のアイテム１つを、同意した対象の［所持品スロット］に移動する。対象の［所持品スロット］に空きがない場合、対象がいるＳｑにアイテムは落とされる。この基本動作をブリーフィングで使用する際、１つのブリーフィングで複数回使用できる。 ",
      "《隠れる》 [基本動作] SR:-/- タイミング:メジャー 判定：判定なし 対象:自身 射程：至近 コスト:- 制限：- 効果：あなたは［隠密］状態になる。ただし、あなたが［ヘイトトップ］の場合、または他のキャラクターの［阻止能力］の対象になっている場合、またはバッドステータスを受けている場合、この基本動作は使用できない。 ",
      "《アイテム鑑定》 [基本動作] SR:-/- タイミング:メジャー 判定：基本（解析／解析難易度） 対象:本文 射程：至近 コスト:- 制限：- 効果：【解析難易度】を持つアイテム１つを対象とする。対象は［解析済］状態になる。 "
    ];

    function normalizeText(value) {
      return String(value ?? "")
        .replaceAll("－", "-")
        .replaceAll("＋", "+")
        .replaceAll("［", "[")
        .replaceAll("］", "]")
        .replaceAll("【ＨＰ】", "【HP】")
        .replaceAll("ＢＳ", "BS")
        .replaceAll("ＣＲ", "CR")
        .replaceAll("ＳＲ", "SR")
        .replaceAll("Ｓｑ", "Sq")
        .replaceAll("Ｄ", "D");
    }

    function parseCharacterId(value) {
      const text = value.trim();
      if (!text) return "";
      const idParam = text.match(/[?&]id=(\d+)/);
      if (idParam) return idParam[1];
      const sheetPath = text.match(/\/(?:sheets|pc)\/?(\d+)(?:\.html|\.json)?/);
      if (sheetPath) return sheetPath[1];
      const digits = text.match(/\d{3,}/);
      return digits ? digits[0] : "";
    }

    function tagsText(tags) {
      return (tags || []).filter(Boolean).map((tag) => `[${normalizeText(tag)}]`).join(" ");
    }

    function itemName(item) {
      if (!item) return "";
      const name = normalizeText(item.name);
      const alias = normalizeText(item.alias);
      return alias && alias !== name ? `${alias}(${name})` : name;
    }

    function skillLine(skill) {
      const tagPart = tagsText(skill.tags);
      const tags = tagPart ? ` ${tagPart}` : "";
      return `《${normalizeText(skill.name)}》${tags} SR:${skill.skill_rank}/${skill.skill_max_rank} タイミング:${normalizeText(skill.timing)} 判定:${normalizeText(skill.roll)} 対象:${normalizeText(skill.target)} 射程:${normalizeText(skill.range)} コスト:${normalizeText(skill.cost)} 制限:${normalizeText(skill.limit)} 効果:${normalizeText(skill.function)} `;
    }

    function abilityBase(value) {
      return normalizeText(value || "0+2D").split("+")[0] || "0";
    }

    function abilityCommand(value, label) {
      const match = normalizeText(value || "0+2D").match(/^(\d+)\+(\d+)D$/);
      if (!match) return `2LH+0>=0 ${label}`;
      return `${match[2]}LH+${match[1]}>=0 ${label}`;
    }

    function itemLine(item) {
      const tagPart = tagsText(item.tags);
      const tags = tagPart ? ` ${tagPart}` : "";
      const details = [];
      if (item.timing && item.timing !== "－") details.push(`タイミング:${normalizeText(item.timing)}`);
      if (item.roll && item.roll !== "－") details.push(`判定:${normalizeText(item.roll)}`);
      if (item.target && item.target !== "－") details.push(`対象:${normalizeText(item.target)}`);
      if (item.range && item.range !== "－") details.push(`射程:${normalizeText(item.range)}`);
      details.push(`効果：${normalizeText(item.function)}`);
      return `${itemName(item)}${tags} ${details.join(" ")}`;
    }

    function section(title, lines) {
      const body = lines.filter(Boolean);
      return body.length ? [`○${title}`, ...body, ""].join("\n") : "";
    }

    function memoFor(pc) {
      return [
        `PL:${pc.player_name || ""}`,
        `防御：物理${pc.physical_defense ?? 0}/魔法${pc.magic_defense ?? 0}`,
        `STR${pc.str_value ?? 0}/DEX${pc.dex_value ?? 0}/POW${pc.pow_value ?? 0}/INT${pc.int_value ?? 0}`,
        `Lv:${pc.level ?? ""} タグ:${tagsText(pc.tags)} `,
        ""
      ].join("\n");
    }

    function extraHealCommands(skill, pc) {
      const name = normalizeText(skill.name);
      if (!name.includes("ヒール")) return [];
      return [
        `3d6+{魔力}+{回復力} ヒール回復量`,
        `3d6+{魔力}+{回復力}+${pc.pow_basic_value ?? 0} ヒール回復量+因果`
      ];
    }

    function formulaToCommand(formula, skill) {
      const calculate = (expression) => {
        const safe = expression.replace(/\s+/g, "");
        if (!/^[\d+\-*/]+$/.test(safe)) return null;
        try {
          return Function(`"use strict"; return (${safe});`)();
        } catch (error) {
          return null;
        }
      };

      return normalizeText(formula)
        .replaceAll("【攻撃力】", "{攻撃力}")
        .replaceAll("【魔力】", "{魔力}")
        .replaceAll("【回復力】", "{回復力}")
        .replaceAll("【STR】", "{STR}")
        .replaceAll("【DEX】", "{DEX}")
        .replaceAll("【POW】", "{POW}")
        .replaceAll("【INT】", "{INT}")
        .replaceAll("【ＳＴＲ】", "{STR}")
        .replaceAll("【ＤＥＸ】", "{DEX}")
        .replaceAll("【ＰＯＷ】", "{POW}")
        .replaceAll("【ＩＮＴ】", "{INT}")
        .replaceAll("【STR基本値】", "{STR基本値}")
        .replaceAll("【DEX基本値】", "{DEX基本値}")
        .replaceAll("【POW基本値】", "{POW基本値}")
        .replaceAll("【INT基本値】", "{INT基本値}")
        .replaceAll("【ＳＴＲ基本値】", "{STR基本値}")
        .replaceAll("【ＤＥＸ基本値】", "{DEX基本値}")
        .replaceAll("【ＰＯＷ基本値】", "{POW基本値}")
        .replaceAll("【ＩＮＴ基本値】", "{INT基本値}")
        .replaceAll("×", "*")
        .replace(/\bSR\b/g, String(skill.skill_rank ?? 0))
        .replace(/\bCR\b/g, "{CR}")
        .replace(/[（(]([^（）(){}]+)[）)]D/g, (all, expression) => {
          const value = calculate(expression);
          return Number.isFinite(value) ? `${value}D` : all;
        })
        .replace(/[（）()]/g, "")
        .replace(/\s+/g, "")
        .replace(/(\d+)D\b/g, "$1D6");
    }

    function extraDamageCommands(skill) {
      const tags = (skill.tags || []).map(normalizeText);
      if (!tags.some((tag) => tag.includes("攻撃"))) return [];

      const text = normalizeText(skill.function);
      const commands = [];
      const damagePattern = /\[([^\]]+)\](?:点)?(?:の)?(物理|魔法|直接|貫通)?ダメージ/g;
      let match;

      while ((match = damagePattern.exec(text)) !== null) {
        commands.push(`${formulaToCommand(match[1], skill)} ${normalizeText(skill.name)}${match[2] ? `、${match[2]}ダメージ` : "ダメージ"}`);
      }

      return commands;
    }

    function commandsFor(pc) {
      const byTiming = new Map(timingOrder.map((timing) => [timing, []]));
      (pc.skills || []).forEach((skill) => {
        const timing = normalizeText(skill.timing || "その他");
        if (!byTiming.has(timing)) byTiming.set(timing, []);
        byTiming.get(timing).push(skillLine(skill), ...extraHealCommands(skill, pc), ...extraDamageCommands(skill), "");
      });

      const equipped = [pc.hand1, pc.hand2, pc.armor, pc.support_item1, pc.support_item2, pc.support_item3, pc.bag]
        .filter((item) => item && item.prefix_function)
        .map((item) => `${itemName(item)} プレフィックスド効果：${normalizeText(item.prefix_function)}`);

      const items = (pc.items || []).filter(Boolean).map(itemLine);
      const emptySlots = Math.max(0, Number(pc.item_slot_size || 0) - (pc.items || []).filter(Boolean).length);
      const magicGrade = [pc.hand1, pc.hand2, pc.armor, pc.support_item1, pc.support_item2, pc.support_item3, pc.bag]
        .filter(Boolean)
        .flatMap((item) => item.tags || [])
        .map((tag) => String(tag).match(/^M(\d+)$/i))
        .filter(Boolean)
        .reduce((sum, match) => sum + Number(match[1]), 0);
      const totalPrice = [pc.hand1, pc.hand2, pc.armor, pc.support_item1, pc.support_item2, pc.support_item3, pc.bag, ...(pc.items || [])]
        .filter(Boolean)
        .reduce((sum, item) => sum + Number(item.price || 0), 0);

      const parts = [
        `キャラクター名:${pc.name || ""}`,
        "",
        "○戦闘の基本",
        `2LH+${abilityBase(pc.abl_hit)}>=0 命中値`,
        `2LH+${abilityBase(pc.abl_avoid)}>=0 回避値 ヘイトトップ`,
        `2LH+${abilityBase(pc.abl_avoid)}+2>=0 回避値 ヘイトアンダー`,
        `2LH+${abilityBase(pc.abl_resist)}>=0 抵抗値 ヘイトトップ`,
        `2LH+${abilityBase(pc.abl_resist)}+2>=0 抵抗値 ヘイトアンダー`,
        "{攻撃力}+1D6 基本武器攻撃、物理ダメージ",
        "{魔力}+1D6 基本魔法攻撃、魔法ダメージ",
        "",
        "○被ダメ計算用",
        "C(0-{物防}-0) 被ダメージ=物理ダメージ-物防-軽減",
        "C(0-{魔防}-0) 被ダメージ=魔法ダメージ-魔防-軽減",
        "C(({HP}+{障壁})-0-{ヘイト}*0-0) 残HP＝(HP+障壁)-ダメージ-ヘイトダメージ-その他",
        "C(0-{HP}) 残障壁=残HP-HP",
        ""
      ];

      timingOrder.forEach((timing) => {
        const lines = byTiming.get(timing) || [];
        const content = lines.filter((line, index, array) => line || array[index - 1]);
        if (content.some(Boolean)) {
          parts.push(`○${timing}`, ...content, "");
        }
      });

      parts.push(...basicActions, "");
      parts.push(section("装備アイテム効果", equipped));
      parts.push(section("所持アイテム一覧", items));
      parts.push(
        "○各種判定",
        abilityCommand(pc.abl_motion, "運動値"),
        abilityCommand(pc.abl_durability, "耐久値"),
        abilityCommand(pc.abl_dismantle, "解除値"),
        abilityCommand(pc.abl_operate, "操作値"),
        abilityCommand(pc.abl_sense, "知覚値"),
        abilityCommand(pc.abl_negotiate, "交渉値"),
        abilityCommand(pc.abl_knowledge, "知識値"),
        abilityCommand(pc.abl_analyze, "解析値"),
        "",
        "○消耗表",
        "PCT{CR}+0 体力消耗表",
        "ECT{CR}+0 気力消耗表",
        "GCT{CR}+0 物品消耗表",
        "CCT{CR}+0 金銭消耗表",
        "",
        "○財宝表",
        "CTRS{CR}+0 金銭財宝表",
        "MTRS{CR}+0 魔法素材財宝表",
        "ITRS{CR}+0 換金アイテム財宝表",
        "",
        "○ステータス",
        `//CR=${pc.character_rank ?? ""}`,
        `//STR=${pc.str_value ?? 0}`,
        `//DEX=${pc.dex_value ?? 0}`,
        `//POW=${pc.pow_value ?? 0}`,
        `//INT=${pc.int_value ?? 0}`,
        `//攻撃力=${pc.physical_attack ?? 0}`,
        `//魔力=${pc.magic_attack ?? 0}`,
        `//回復力=${pc.heal_power ?? 0}`,
        `//武器の射程=${normalizeText(pc.range || "")}`,
        `//物防=${pc.physical_defense ?? 0}`,
        `//魔防=${pc.magic_defense ?? 0}`,
        `//行動値=${pc.action ?? 0}`,
        `//最大HP=${pc.max_hitpoint ?? 0}`,
        `//初期因果力=${pc.effect ?? 0}`,
        `//空きスロット数=${emptySlots}`,
        `//マジックアイテムのグレード数合計=${magicGrade}`,
        `//所持品の価格合計=${totalPrice}`,
        "",
        "○その他欄貼付け用",
        memoFor(pc)
      );

      return parts.join("\n").replace(/\n{4,}/g, "\n\n\n");
    }

    function toCocofolia(pc, id) {
      const memo = memoFor(pc);
      return {
        kind: "character",
        data: {
          name: pc.name || "",
          initiative: Number(pc.action || 0),
          memo,
          externalUrl: `https://lhrpg.com/lhz/pc?id=${id || parseCharacterId(pc.sheet_url || "")}`,
          status: [
            { label: "HP", value: Number(pc.max_hitpoint || 0), max: Number(pc.max_hitpoint || 0) },
            { label: "因果力", value: Number(pc.effect || 0), max: Number(pc.effect || 0) },
            { label: "ヘイト", value: 0, max: 0 },
            { label: "疲労", value: 0, max: 0 },
            { label: "障壁", value: 0, max: 0 }
          ],
          params: [
            { label: "STR", value: String(pc.str_value ?? 0) },
            { label: "DEX", value: String(pc.dex_value ?? 0) },
            { label: "POW", value: String(pc.pow_value ?? 0) },
            { label: "INT", value: String(pc.int_value ?? 0) },
            { label: "攻撃力", value: String(pc.physical_attack ?? 0) },
            { label: "魔力", value: String(pc.magic_attack ?? 0) },
            { label: "回復力", value: String(pc.heal_power ?? 0) },
            { label: "物理防御力", value: String(pc.physical_defense ?? 0) },
            { label: "魔法防御力", value: String(pc.magic_defense ?? 0) }
          ],
          commands: commandsFor(pc)
        }
      };
    }

    async function fetchCharacter(id) {
      const proxyResponse = await fetch(`/api/character?id=${encodeURIComponent(id)}`);
      const proxyJson = await proxyResponse.json().catch(() => null);
      if (proxyResponse.ok) {
        return proxyJson;
      }

      try {
        const localResponse = await fetch(`./${encodeURIComponent(id)}.json`);
        if (localResponse.ok) {
          return await localResponse.json();
        }
      } catch (error) {
        // Continue to the official API fallback below.
      }

      try {
        const directResponse = await fetch(`https://lhrpg.com/lhz/api/${encodeURIComponent(id)}.json`);
        if (directResponse.ok) {
          return await directResponse.json();
        }
      } catch (error) {
        throw new Error(proxyJson?.error || "キャラクターJSONを取得できませんでした。VercelにデプロイするとAPIプロキシ経由で取得できます。");
      }

      throw new Error(proxyJson?.error || "キャラクターJSONを取得できませんでした。");
    }

    async function convertFromInput() {
      const id = parseCharacterId(sourceInput.value);
      if (!id) {
        setStatus("キャラクターIDまたはURLを入力してください。", true);
        return;
      }

      setBusy(true);
      setStatus(`ID ${id} を取得しています...`);
      try {
        const pc = await fetchCharacter(id);
        output.value = JSON.stringify(toCocofolia(pc, id), null, 2);
        setStatus(`${pc.name || "キャラクター"}を変換しました。`);
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        setBusy(false);
      }
    }

    async function convertSample() {
      setBusy(true);
      setStatus("ローカルの 208568.json を変換しています...");
      try {
        const response = await fetch("./208568.json");
        if (!response.ok) throw new Error("208568.json を読み込めませんでした。");
        const pc = await response.json();
        output.value = JSON.stringify(toCocofolia(pc, "208568"), null, 2);
        sourceInput.value = "208568";
        setStatus(`${pc.name || "サンプル"}を変換しました。`);
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        setBusy(false);
      }
    }

    async function copyOutput() {
      if (!output.value) {
        setStatus("コピーする変換結果がありません。", true);
        return;
      }

      await navigator.clipboard.writeText(output.value);
      setStatus("クリップボードにコピーしました。");
    }

    function setBusy(isBusy) {
      convertButton.disabled = isBusy;
      sampleButton.disabled = isBusy;
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    convertButton.addEventListener("click", convertFromInput);
    sampleButton.addEventListener("click", convertSample);
    copyButton.addEventListener("click", copyOutput);
    sourceInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") convertFromInput();
    });
  </script>
</body>
</html>
